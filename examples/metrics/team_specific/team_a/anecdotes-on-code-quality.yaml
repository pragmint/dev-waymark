title: Developer Sentiment on Code Quality
description: A collection of developer comments as it relates to code quality on systems that the Care Matching team manages.
data:
  - date: 19.2.2026
    value: '[in reference to a unit test that asserts true to be true] I love this team, but I think we need a refresher on testing strategy. This might be something to look at once we have linting better handled.'
  - date: 25.2.2026
    value: OBIE/ABIE APIs were not impacted [by an outage], but we should better understand how the LSCOM API drifted from the core matching logic.
  - date: 25.2.2026
    value: Do we know why our unit tests didn't catch this filtering scenario? This seems like a gap in coverage. [in reference to an outage]
  - date: 27.1.2026
    value: The code quality seems to be getting in the way on a routine basis.
  - date: 26.1.2026
    value: Seemingly every time I run the tests, something new is broken.

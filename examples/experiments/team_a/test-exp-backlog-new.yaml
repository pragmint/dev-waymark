context:
  problem_statement: >
    Our team has grown from 4 to 12 engineers over the last year, but we haven't
    revisited our ways of working. Meetings are unfocused, decision-making is
    unclear, and newer members don't understand our implicit norms around communication,
    code review, or conflict resolution.
  desired_outcome: >
    Create shared understanding of how the team operates by documenting our values,
    working agreements, and decision-making processes. Establish clearer norms
    that help new members onboard faster and reduce friction in daily collaboration.
hypothesis:
  statement: >
    If we collaboratively create a team charter that documents our values, working
    agreements, and collaboration norms, then we will reduce onboarding time for
    new engineers by 40% and improve team satisfaction scores by 25%.
  assumptions:
    - Team members will engage honestly in charter creation discussions.
    - A written charter will actually influence day-to-day behavior and decisions.
    - We can reach consensus on contentious topics (meeting policies, on-call, etc.).
  risks:
    - Charter might become shelfware that no one references after initial creation.
    - Forcing consensus on controversial topics might create superficial agreement.
    - Time investment might feel frivolous compared to "real work."
  risk_mitigations:
    - Start with small, concrete agreements and iterate based on what's useful.
    - Reference charter in team rituals (retros, 1:1s) to keep it alive.
    - Keep document concise and action-oriented rather than philosophical.
intervention:
  practice_under_test: create-a-team-charter
  related_capabilities:
    - generative-organizational-culture
    - loosely-coupled-teams
    - learning-culture
  description: >
    Facilitate a series of workshops where the team defines values, working agreements,
    and norms. Cover topics like communication preferences, code review standards,
    meeting policies, and conflict resolution. Document in a living charter that's
    revisited quarterly.
  success_criteria:
    - metric: onboarding-time
      target: reduce from 6 weeks to under 4 weeks
      measurement_window: after_experiment
      notes: >
        Measure time until new engineers can contribute independently without
        needing constant clarification on team norms. Survey last 3 new hires.
    - metric: team-satisfaction-score
      target: improve by 20 points (on 100-point scale)
      measurement_window: after_experiment
      notes: >
        Quarterly team health survey focusing on psychological safety, clarity
        of expectations, and collaboration quality.
  status: backlog
  start-date:
  expected-duration-in-weeks: 4
  action-plan:
    - title: Schedule initial charter workshop with full team
      assigned-to:
        - Engineering Manager
      link:
      status: backlog
    - title: Facilitate values and working agreements discussions
      assigned-to:
        - Engineering Manager
        - Team Lead
      link:
      status: backlog
    - title: Draft charter document and share for feedback
      assigned-to:
        - Team Lead
      link:
      status: backlog
    - title: Finalize and publish charter in team wiki
      assigned-to:
        - Team Lead
      link:
      status: backlog
    - title: Integrate charter into onboarding and quarterly team retros
      assigned-to:
        - Engineering Manager
      link:
      status: backlog
decision-roles:
  - responsible:
      - Engineering Manager
      - Team Lead
  - accountable:
      - Engineering Manager
  - consulted:
      - All Team Members
  - informed:
      - HR
      - Other Engineering Teams

context:
  problem_statement: >
    We're spending 30% of our sprint capacity on production incidents and hotfixes,
    leaving little time for planned work. Many incidents are discovered by users
    rather than our monitoring systems, leading to poor user experience and reactive firefighting.
  desired_outcome: >
    Shift from reactive incident response to proactive problem detection by implementing
    comprehensive monitoring and alerting that notifies us of issues before users are impacted.
hypothesis:
  statement: >
    If we implement symptom-based alerts for our critical user journeys and establish
    on-call runbooks, then we will reduce time-to-detection by 75% and decrease
    user-reported incidents by 60%.
  assumptions:
    - We can identify and instrument the most critical user journeys within 4 weeks.
    - Alert noise won't overwhelm the team if we tune thresholds carefully.
    - Engineers are willing to participate in on-call rotation.
  risks:
    - Too many false positives could lead to alert fatigue and ignored notifications.
    - Inadequate runbooks might leave on-call engineers struggling to respond effectively.
    - Monitoring overhead could impact application performance.
  risk_mitigations:
    - Start with 5-10 high-value alerts and tune aggressively before expanding.
    - Create runbooks iteratively as incidents occur, not all upfront.
    - Use sampling and async logging to minimize performance impact.
intervention:
  practice_under_test: implement-symptom-based-alerts
  related_capabilities:
    - monitoring-and-observability
    - proactive-failure-notification
  description: >
    Identify the top 5 critical user journeys (login, checkout, data export, etc.)
    and implement symptom-based alerts that trigger when success rates drop or
    latency increases beyond acceptable thresholds. Create basic runbooks and
    establish an on-call rotation.
  success_criteria:
    - metric: mean-time-to-detection
      target: reduce from 45min to under 10min
      measurement_window: during_experiment
      notes: >
        Measure time between when an issue starts affecting users and when our
        monitoring alerts. Track this for all P1/P2 incidents.
    - metric: user-reported-incidents
      target: reduce by 50%
      measurement_window: after_experiment
      notes: >
        Compare incidents reported via support tickets vs caught by monitoring.
        Goal is to catch issues before users notice.
  status: pitch
  start-date:
  expected-duration-in-weeks: 10
  action-plan:
    - title: Map critical user journeys and define SLOs
      assigned-to:
        - Dev Team
        - Product Team
      link:
      status: backlog
    - title: Implement monitoring instrumentation for top 5 journeys
      assigned-to:
        - TBD
      link:
      status: backlog
    - title: Configure alerts with appropriate thresholds
      assigned-to:
        - TBD
      link:
      status: backlog
    - title: Create incident runbooks for common failure modes
      assigned-to:
        - TBD
      link:
      status: backlog
    - title: Establish on-call rotation and escalation procedures
      assigned-to:
        - Engineering Manager
      link:
      status: backlog
decision-roles:
  - responsible:
      - TBD
  - accountable:
      - Engineering Manager
  - consulted:
      - Product Team
      - SRE Team
  - informed:
      - Executive Team

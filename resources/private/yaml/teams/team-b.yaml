activeExperiments:
  - id: exp-team-b-001
    practiceId: implement-tdd
    startDate: 2025-10-15
    hypothesis: >
      Adopting TDD for new features will reduce bug density by 40% and improve
      code maintainability scores.
    status: in-progress
    duration: 12 weeks
    supportingEvidence:
      metrics:
        - "Current bug density: 8.5 bugs per 1000 lines of code"
        - "Post-release hotfixes required for 60% of features"
        - "Code maintainability index: 62 (moderate)"
      anecdotes:
        - "QA team spends 70% of time on regression testing"
        - "Developers spend significant time debugging integration issues"
        - "Recent payment feature had 12 bugs in first week of production"
    actionPlan:
      - task: "Conduct TDD workshop for team"
        assignees: ["Sarah Johnson"]
      - task: "Set up TDD-friendly testing infrastructure"
        assignees: ["Mike Chen", "Lisa Park"]
      - task: "Pilot TDD on checkout flow refactor"
        assignees: ["Sarah Johnson", "Mike Chen"]
      - task: "Measure and document bug density improvements"
        assignees: ["Lisa Park"]
      - task: "Expand TDD to all new feature work"
        assignees: ["All developers"]
    decisionRoles:
      decisionMaker: ["Emma Wilson (Engineering Manager)", "Sarah Johnson (Tech Lead)"]
      contributors: ["Sarah Johnson", "Mike Chen", "Lisa Park", "All Team B Developers"]
      consulted: ["QA Team", "Architecture Team"]
      informed: ["Product Team", "Other Engineering Teams"]
    expectedImpact:
      metrics: "Reduce bug density from 8.5 to 5.1 bugs per 1000 LOC (40% reduction). Reduce post-release hotfixes from 60% to 30% of features. Improve code maintainability index from 62 to 75."
      anecdotes: "Developers will catch bugs during development rather than in QA or production. QA team can focus on exploratory testing instead of basic functionality. Team confidence in releases will increase significantly."
  - id: exp-team-b-002
    practiceId: conduct-code-reviews
    startDate: 2025-09-01
    hypothesis: >
      Implementing structured code reviews with checklists will improve code quality
      and knowledge sharing across the team.
    status: blocked
    duration: 10 weeks
    supportingEvidence:
      metrics:
        - "Code review participation: 45% (should be 100%)"
        - "Average review time: 6 hours (too slow)"
        - "Knowledge silos: 3 critical systems only understood by 1 person each"
      anecdotes:
        - "PRs often approved with just 'LGTM' and no real review"
        - "Junior developers rarely get feedback on code quality"
        - "When senior dev was on vacation, team couldn't modify auth system"
    actionPlan:
      - task: "Create code review checklist template"
        assignees: ["Sarah Johnson"]
      - task: "Set up automated review reminders"
        assignees: ["Mike Chen"]
      - task: "Train team on effective code review practices"
        assignees: ["Sarah Johnson", "Emma Wilson"]
      - task: "Implement mandatory review policy in CI/CD"
        assignees: ["Mike Chen"]
    decisionRoles:
      decisionMaker: ["Emma Wilson (Engineering Manager)"]
      contributors: ["Sarah Johnson", "Mike Chen", "Lisa Park"]
      consulted: ["All Team B Developers", "DevEx Team"]
      informed: ["Product Team", "QA Team"]
    expectedImpact:
      metrics: "Increase code review participation from 45% to 100%. Reduce average review time from 6 hours to 2 hours. Eliminate single-person knowledge silos (from 3 to 0 critical systems)."
      anecdotes: "Every PR will receive meaningful feedback. Junior developers will learn best practices through reviews. Team members will be able to cover for each other on any system. Code quality will improve through shared standards."
  - id: exp-team-b-003
    practiceId: run-pair-programming-sessions
    startDate: 2025-12-10
    hypothesis: >
      Weekly pair programming sessions will reduce knowledge silos and improve
      team collaboration metrics.
    status: in-progress
    duration: 8 weeks
    supportingEvidence:
      metrics:
        - "Team collaboration score: 6.2/10"
        - "Cross-team knowledge: 3 critical systems with single experts"
        - "Onboarding time for new developers: 6 weeks"
      anecdotes:
        - "Developers work in isolation and rarely collaborate"
        - "Complex features often get stuck waiting for one specific person"
        - "New team members feel overwhelmed and unsupported"
    actionPlan:
      - task: "Schedule recurring pair programming slots"
        assignees: ["Emma Wilson"]
      - task: "Create pairing rotation schedule"
        assignees: ["Sarah Johnson"]
      - task: "Set up remote pairing tools and guidelines"
        assignees: ["Mike Chen"]
      - task: "Track and share pairing outcomes"
        assignees: ["Lisa Park"]
    decisionRoles:
      decisionMaker: ["Emma Wilson (Engineering Manager)", "Sarah Johnson (Tech Lead)"]
      contributors: ["All Team B Developers"]
      consulted: ["HR/People Ops", "Other Engineering Managers"]
      informed: ["Product Team"]
    expectedImpact:
      metrics: "Increase team collaboration score from 6.2 to 8.0. Reduce critical single-expert systems from 3 to 0. Reduce onboarding time from 6 weeks to 3 weeks."
      anecdotes: "Developers will feel more connected and supported. Complex problems will be solved faster through collaboration. New team members will ramp up quickly by pairing with experienced developers. Team will build collective ownership of the codebase."

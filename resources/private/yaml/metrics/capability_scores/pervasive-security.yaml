data:
  - team: various
    date: 30.1.2026
    value: 1.5
    justification: |-
      Security controls are present in the delivery lifecycle, indicating an intent to integrate security earlier rather than relying solely on end-stage inspection. Container image vulnerability scanning is executed during CI builds, and SonarQube is available across several projects to surface security and quality issues.
      However, these controls are not operating as reliable, end-to-end mechanisms that support daily development work. The CVE reporting pipeline is currently broken because the DefectDojo upload step is quietly failing (invalid token header). As a result, vulnerabilities identified during CI are not consistently tracked, reviewed, or remediated through normal engineering workflows.
      There are also gaps in how security checks are enforced. SonarQube security scanning is applied inconsistently, with gating disabled in some projects and broad exclusions configured in others. This reduces the effectiveness of automated security feedback and weakens the signal developers receive during code review and integration.
      In addition, multiple codebases contain a visible CORS misconfiguration, with AllowAnyOrigin() enabled. This suggests that common security risks are not always identified or addressed during development or review.

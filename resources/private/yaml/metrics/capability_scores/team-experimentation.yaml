data:
  - team: various
    date: 30.1.2026
    value: 2
    justification: |-
      Multiple interviews described leaders as listening when teams propose improvements, raise concerns, or suggest alternative approaches. This openness supports constructive dialogue between teams and leadership.
      While teams have discretion over technical implementation, teams do not routinely write or change specifications during development as new information is discovered. Experimentation occurs in specific situations, such as focused spikes or investigations that are supported by leadership, rather than as a regular, team-driven practice embedded in day-to-day delivery.

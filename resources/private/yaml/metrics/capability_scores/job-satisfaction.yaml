data:
  - team: various
    date: 30.1.2026
    value: 1.5
    justification: |-
      Job satisfaction is uneven due to limited empowerment and access to resources. Engineers reported reliance on SRE or DevOps teams for configuration changes and access to production, CI pipelines, and shared environments. Improvement work is often treated as secondary to delivery, which limits the sense that judgment and expertise are consistently valued across the team.

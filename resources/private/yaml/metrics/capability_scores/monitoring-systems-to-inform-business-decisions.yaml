    date: 30.1.2026
    value: 2
    justification: |-
      Monitoring data is being collected and used to understand performance against business outcomes, particularly by product teams using PowerBI.
      Engineering monitoring appears primarily operational and incident-focused, however, with limited sharing of insights between product, operations, and development. As a result, monitoring supports local understanding but is not yet consistently used to inform cross-functional learning or broader business decisions.

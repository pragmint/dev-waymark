data:
  - team: various
    date: 30.1.2026
    value: 1.5
    justification: |-
      Database changes are handled through a mix of approaches across the codebase. Some parts of the system appear to use migration tooling, while other parts rely on direct scripts or repo-specific patterns. This creates inconsistency in how schema changes are proposed, reviewed, and applied.
      Multiple services and teams make changes against the same shared database and, in some cases, the same shared tables. This increases the importance of having a single, visible process for database changes so that teams can understand what changes are coming and how they may affect other services.
      Based on interviews, there is not a clear, consistent source of truth that tracks which database changes have been applied to which environments. Engineers described uncertainty about which repo “owns” the database change process for shared tables, and reported that different repositories may apply changes using different mechanisms. This suggests that database changes can introduce coordination overhead during delivery.

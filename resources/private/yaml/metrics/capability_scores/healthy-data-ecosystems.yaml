data:
  - team: various
    date: 30.1.2026
    value: 1
    justification: |-
      Engineers consistently reported difficulty working with production-like data when developing, testing, or troubleshooting. PII constraints prevent reusing real data, and there is no standardized or automated way to generate representative datasets. As a result, teams often validate behavior using incomplete or artificial scenarios that do not fully reflect real-world conditions.
      Interviews also surfaced fragmentation in how data is understood and used across systems. Data flows span multiple services and integrations, yet teams lack shared clarity on which datasets are authoritative or how changes propagate. This increases reliance on manual investigation and implicit knowledge rather than trusted, well-defined data assets.
      Core data domains do not appear to have explicit ownership. Responsibility for data quality, structure, and reuse appears implicit, so it is challenging for the organization to treat internal data as a curated, reliable input for development and AI-assisted workflows.

data:
  - team: various
    date: 30.1.2026
    value: 2
    justification: |-
      Leadership is actively involved in day-to-day decisions and change efforts, especially around platform stability, architectural consolidation, and AI adoption. While leadership priorities are generally clear in the short term, longer-term direction is unclear across roles. Several interviewees described knowing what they are expected to work on next, but not how current efforts connect to a broader strategy or future state.
      This showed up in different ways. Product leadership noted that roadmap context is not widely socialized and tends to be held by a small group. Engineers described situations where important system context or dependencies were unknown until late in the work, requiring investigation or rework. Senior engineers expressed frustration with shifting decision authority and changing initiatives, which made it harder to align independently without relying on direct guidance.
      These signals suggest that vision exists at the leadership level, but is not consistently translated into a shared understanding that teams can use to guide decisions without additional coordination.

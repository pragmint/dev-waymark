data:
  - team: various
    date: 30.1.2026
    value: 1.5
    justification: |-
      Learning is permitted but not consistently enabled or treated as a strategic investment. Leadership has encouraged the use of AI tools, and several engineers described personal efforts to learn new techniques or improve practices. These efforts are largely self-directed and depend on individual motivation rather than being supported by shared structures, time allocation, or organizational expectations.
      Learning activities are not clearly connected to improving delivery outcomes such as reducing incidents, shortening lead time, or increasing confidence in releases. Several interviewees described a highly reactive environment where firefighting, approvals, and incident response consume available capacity. In this context, learning is often deferred in favor of immediate delivery needs, even when teams recognize that skill development and practice improvement would reduce future risk.
      Systematic learning practices (such as regular knowledge-sharing sessions, blameless post-incident learning loops with follow-through, or shared reflection on what is working and not working) are lacking. New ideas and improvements are often introduced by new hires or individual contributors, but these are not consistently reinforced through backlog prioritization, feedback cycles, or recognition.

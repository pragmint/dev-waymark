data:
  - team: various
    date: 30.1.2026
    value: 1.5
    justification: |-
      The organization is actively using AI tools, but lacks a deliberate context engineering system that connects those tools to reliable, structured internal data. AI usage today is primarily manual and individual-driven rather than supported automated retrieval mechanisms (developers copy and paste code or documentation into prompts).
      Internal knowledge sources (e.g., codebases, documentation, architectural context, operational signals) are fragmented and, in some cases, inconsistently maintained. High-quality documentation is beginning to accumulate in Loop. However, project READMEs are often incomplete, out of date, or AI-generated hallucinations. Several developer interviews indicated that people still rely heavily on tribal knowledge and code spelunking to understand how the system works.
      There is some evidence of curated, AI-ready internal data (e.g., canonical architecture diagrams, domain models, decision records, or gold-standard repositories). But there is no automated or semi-automated retrieval layer (e.g., RAG or MCP-style services) that could securely provide relevant context to AI systems. Operational data (e.g., logs, metrics, traces, incident history) is not routinely accessible to developers or integrated into AI workflows, further limiting AI’s usefulness for debugging and incident response.
      As a result, AI tools behave as generic assistants rather than context-aware experts. While they provide local productivity gains, they also risk amplifying outdated patterns, low-quality documentation, and inconsistent practices.

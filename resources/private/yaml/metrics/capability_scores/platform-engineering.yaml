data:
  - team: various
    date: 30.1.2026
    value: 1
    justification: |-
      There are few platform capabilities that reduce developer cognitive load through self-service and repeatable golden paths. Several workflows that should be standardized and developer-driven still depend on manual coordination with an enabling function.
      A recurring constraint is that developers need SRE involvement to complete common platform-related tasks, such as updating environment variables and secrets, and resolving CI or deployment pipeline failures when they occur. In some cases, developers lack the access required to diagnose or remediate the underlying issues themselves.
      The platform’s operating model is reactive support rather than an internal product with explicit developer journeys, clear task outcomes, and a visible roadmap. Infrastructure enablement work appears to be prioritized through ad hoc channels and social escalation, which limits predictability and repeatability for application teams.
      This matters in an AI-amplified environment because faster code generation does not remove downstream bottlenecks. The interview notes indicate that delivery speed gains are frequently absorbed by manual steps and dependency on enabling teams in the build, deploy, and configuration workflows.

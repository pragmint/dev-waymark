data:
  - team: various
    date: 30.1.2026
    value: 1.5
    justification: |-
      Engineers experience moderate to high deployment pain driven by slow, failure-prone, and coordination-heavy release processes. Deployments often require manual approvals, environment coordination, and SRE involvement, which increases anxiety around releasing changes and extends working hours during hotfixes. Incidents frequently trigger broad “swarm” responses rather than targeted triage, making deployments disruptive to focus and planned work.
      A significant portion of engineering time is spent on reactive and unplanned work rather than proactive value creation. Multiple engineers reported frequent firefighting, emergency fixes, and post-release remediation. Legacy architecture, configuration drift, and inconsistent test coverage contribute to rework, with some teams estimating a substantial share of time spent correcting issues instead of building new capabilities.
      These conditions create sustained burnout risk rather than acute burnout signals. Engineers described high cognitive load, frequent interruptions, and limited control over delivery constraints such as approvals, infrastructure access, and prioritization. While some individuals noted incremental improvement and optimism, the underlying work environment still emphasizes responsiveness over recovery, learning, and sustainable pacing.

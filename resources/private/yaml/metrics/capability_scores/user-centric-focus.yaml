data:
  - team: various
    date: 30.1.2026
    value: 2
    justification: |-
      User needs are present in the delivery system, but primarily through intermediaries rather than as a shared, continuous signal that directly shapes engineering priorities. Engineers typically encounter user context through product tickets, QA findings, incident reports, demos in the training environment, or post-incident analysis rather than through direct and routine exposure to users, user data, or user-research activities.
      Several teams use tools such as PostHog session replay to understand user failures after issues occur. This provides valuable insight into breakdowns in the user experience, but it is most often applied reactively.
      Backlog shaping and prioritization are largely driven by product and leadership. User value is often inferred from requirements rather than observed directly, which reduces shared understanding across the team.

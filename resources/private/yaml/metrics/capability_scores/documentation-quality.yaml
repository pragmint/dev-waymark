data:
  - team: various
    date: 30.1.2026
    value: 2
    justification: |-
      Internal documentation exists in Microsoft Loop and project repositories. Teams generally have access to basic onboarding materials such as README files and documents describing migrations, testing, and deployment workflows. This establishes a baseline level of availability.
      However, interviews and recent pull request reviews indicate that documentation quality is inconsistent. A recent PR added a large volume of documentation, but portions were inaccurate and included broken links that returned 404 errors. The documentation appeared to be AI-generated and did not reliably reflect system behavior. This can reduce trust in the documentation and add confusion rather than clarity.
      More broadly, engineers reported gaps in system-level documentation, especially around architecture, ownership, and third-party integrations. As a result, teams frequently rely on code inspection and tribal knowledge to understand how the system works.

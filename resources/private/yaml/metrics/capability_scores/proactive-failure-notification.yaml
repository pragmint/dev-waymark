data:
  - team: various
    date: 30.1.2026
    value: 1
    justification: |-
      Failure notification is primarily handled through a shared incident communication channel, with limited triage to distinguish severity or to limit interruption to only the people best positioned to respond. This results in broad awareness after an issue is already present rather than focused, early intervention.
      Although monitoring tools are in place, interview feedback did not indicate consistent use of alerting rules based on predictive thresholds or rate-of-change signals.
      Post-incident review activities do not consistently translate into improvements in alerting. While incidents are discussed, we never observed a repeatable practice for identifying leading indicators from incidents and converting them into monitored metrics or alert thresholds to prevent recurrence.

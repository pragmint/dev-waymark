data:
  - team: various
    date: 30.1.2026
    value: 2
    justification: |-
      The organization has a clear and well-understood stance on AI usage. Developers are explicitly encouraged to use AI, approved enterprise tools are readily available, and there is no fear of reprisal for experimentation. This clarity has removed psychological safety concerns. Developers do not hesitate to use AI in their daily work, and adoption is widespread across roles.
      Where the capability falls short is collective learning and amplification. AI usage is largely individual and opportunistic, with little evidence of shared reflection on what is working, what is not, or how AI is improving or degrading outcomes.

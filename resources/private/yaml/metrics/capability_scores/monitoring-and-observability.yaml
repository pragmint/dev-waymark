data:
  - team: various
    date: 30.1.2026
    value: 1.5
    justification: |-
      Application telemetry is generated through in-application instrumentation, primarily using Pino logging and the Azure App Insights SDK. The OpenTelemetry SDK is present in some projects, but it does not appear to be consistently configured or used across services. App Insights and PostHog are used to store, search, and explore the resulting logs, metrics, and limited trace data.
      Structured logging exists in the shared library Atlas.Platform.Shared.Common.Logger, which provides a foundation for emitting richer, machine-readable logs. However, adoption of this approach is uneven, and so correlating events and analyzing system behavior across services remains unreliable.
      Monitoring varies by team and service and is not consistently used to provide early detection of service degradation. Several engineers described learning about failures through manual signals such as incident channels, product reports, or direct messages, rather than through automated alerts or dashboards that report system health or customer-experienced impact.
      Observability for active production debugging is constrained. Although trace identifiers are generated in some parts of the system, trace correlation does not reliably extend across the newer application and the broader service landscape. When issues span multiple services, developers often rely on timestamps and manual log inspection rather than end-to-end traces to understand execution flow and failure modes.

data:
  - team: various
    date: 30.1.2026
    value:
      - manual-test-data-management: 1.5
        justification: |-
          Test data is often stored in long-lived, shared environments, which means some scenarios depend on existing environment state and can require coordination to keep data usable. Restrictions on using production data due to PII concerns further limit access to realistic scenarios. Interviews did not surface a consistent, standardized approach for providing production-like datasets on-demand. Overall, manual test data is workable, but it still requires meaningful human effort and can be a limiting factor when trying to run broader testing consistently.
      - automated-test-data-management: 2.5
        justification: |-
          There is clear evidence of multiple approaches to automated test data management across the codebase. Some tests fully manage their own state by creating required data as part of test setup, often using in-memory databases, mocks, or API-driven creation flows. These tests are isolated, repeatable, and can run independently of shared environment data, particularly in unit, integration, and controller-level tests.
          However, automated test data management is not applied consistently across the ecosystem. Some automated tests rely on shared environment state and pre-existing reference data.

data:
  - team: various
    date: 30.1.2026
    value: 1.5
    justification: |-
      Peer review is part of the workflow. However, promoting changes through environments, including production and hotfixes, commonly requires multiple manual approvals that sit outside the core development team.
      Approvals often include roles beyond the immediate delivery team, such as a rotating release champion, product sign off tied to the specific tickets in the release, an engineering leader, security sign off, and a QA representative. These approval steps frequently add wait time measured in days and sometimes surface late-cycle miscommunication between product and engineering leadership that causes rework.
      The approval process is only lightly supported by automated validation, which several team members described as weak or inconsistent. This increases the perceived need for manual review at promotion time rather than shifting risk controls earlier into the development platform.

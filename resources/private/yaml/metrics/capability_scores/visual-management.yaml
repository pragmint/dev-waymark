data:
  - team: various
    date: 30.1.2026
    value: 1.5
    justification: |-
      Teams use basic visual tools such as task boards to coordinate work, but these primarily function as status trackers rather than as active feedback mechanisms for day-to-day operational decision-making.
      While some visual signals exist through tools like GitHub Actions and Azure AppInsights, teams do not routinely use shared visual displays to collectively monitor system health or delivery conditions as part of daily work. When issues arise, teams tend to learn about them through chat messages or direct notification rather than through visual cues that make emerging problems immediately visible and prompt coordinated response.
